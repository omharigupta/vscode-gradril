# Gradril — Docker Compose
# Runs the Guardrails AI backend server for Gradril extension

services:
  gradril-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GUARDRAILS_TOKEN: ${GUARDRAILS_TOKEN}
    container_name: gradril-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
